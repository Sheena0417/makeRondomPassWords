<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div>
            <h1>Generate a <span class="titleColorCange">Random Password</span></h1>
            <p class="subtitle">Never use an insecure password again</p>
        </div>

        <div class="switchToggle">
            <div class="nomberSwitch">
                <p>Nomber</p>
                <label class="switch">
                    <input type="checkbox" id="toggle">
                    <span class="slider"></span>
                    <span class="text">ON</span>
                </label>
            </div>

            <div class="simbolSwitch">
                <p>Symbol</p>
                <label class="switch">
                    <input type="checkbox" id="toggle">
                    <span class="slider"></span>
                    <span class="text">ON</span>
                </label>
            </div>
        </div>

        <div class="numberOfCharacters">
            <p>Number of characters</p>
            <input id="number-el" type="number" value="0" />
        </div>

        <button onclick="generatePassword()">Generate Password</button>

        <hr>

        <button id="password01-el"></button>
        <button id="password02-el"></button>

        <script src="index.js"></script>
    </body>
</html>
